<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 05 html</title>
</head>
<body>
    <header>Teste de pagina no HTML</header>
    <br>

    <button id="btn">Incrementar</button>
    <div id="container"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <script>
        let contador = 0;

        $("#btn").click(incrementar);

        function incrementar(){
            contador++;

            let p = $("<p></p>");
            p.text("Adicionando texto dinâmico " + contador);
            
            // Corrigido: o ID agora coincide com a div lá de cima
            $("#container").append(p);
        }
    </script>
</body>
</html>
